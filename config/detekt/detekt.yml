build:
  maxIssues: -1

naming:
  FunctionNaming:
    excludes:
      - "**/ui/**"
      - "**/*Screen*"
      - "**/*Component*"
      - "**/*Composable*"
      - "**/test/**"
      - "**/androidTest/**"
  MatchingDeclarationName:
    active: true
    # Spring Boot entry point conventionally named Application.kt
    excludes:
      - "**/Application.kt"

style:
  MagicNumber:
    ignoreNumbers:
      - "-1"
      - "0"
      - "1"
      - "2"
      - "3"
      - "4"
      - "5"
      - "8"
      - "10"
      - "60"
      - "100"
      - "200"
      - "300"
      - "400"
      - "500"
      - "1000"
      - "3000"
      - "3600"
      - "8080"
      - "86400"
    ignoreHashCodeFunction: true
    ignorePropertyDeclaration: true
    ignoreLocalVariableDeclaration: true
    ignoreConstantDeclaration: true
    ignoreCompanionObjectPropertyDeclaration: true
    ignoreAnnotation: true
    ignoreEnums: true
  MaxLineLength:
    maxLineLength: 150
    excludeCommentStatements: true
  SpreadOperator:
    active: false
  ReturnCount:
    active: true
    max: 4
    excludeReturnFromLambda: true
  UnusedParameter:
    active: true
    # Spring @ExceptionHandler requires exception parameter in method signature
    excludeAnnotatedFunction:
      - "ExceptionHandler"

complexity:
  CognitiveComplexMethod:
    active: true
    threshold: 30
  LongMethod:
    active: true
    threshold: 60
  LongParameterList:
    active: true
    functionThreshold: 6
    constructorThreshold: 8
  TooManyFunctions:
    active: true
    thresholdInFiles: 20
    thresholdInClasses: 15

coroutines:
  active: true

exceptions:
  active: true

potential-bugs:
  active: true
