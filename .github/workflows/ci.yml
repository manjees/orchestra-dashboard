name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─── Shared KMP Module ──────────────────────────────────────
  shared:
    name: Shared (KMP) Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: wrapper

      - name: Run shared tests (JVM target)
        run: ./gradlew :shared:desktopTest --parallel

      - name: Upload shared test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: shared-test-results
          path: shared/build/reports/tests/

  # ─── Spring Boot Server ─────────────────────────────────────
  server:
    name: Server (Spring Boot) Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: wrapper

      - name: Build server
        run: ./gradlew :server:build --parallel

      - name: Run server tests
        run: ./gradlew :server:test

      - name: Upload server test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: server-test-results
          path: server/build/reports/tests/

      - name: Build bootJar (production artifact)
        run: ./gradlew :server:bootJar

      - name: Upload server JAR
        uses: actions/upload-artifact@v4
        with:
          name: server-jar
          path: server/build/libs/*.jar

  # ─── Desktop App ────────────────────────────────────────────
  desktop:
    name: Desktop App Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: wrapper

      - name: Build desktop app
        run: ./gradlew :desktopApp:build --parallel

  # ─── Android App ────────────────────────────────────────────
  android:
    name: Android App Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: wrapper

      - name: Build Android debug APK
        run: ./gradlew :androidApp:assembleDebug --parallel

      - name: Upload Android APK
        uses: actions/upload-artifact@v4
        with:
          name: android-debug-apk
          path: androidApp/build/outputs/apk/debug/*.apk

  # ─── Code Quality ───────────────────────────────────────────
  quality:
    name: Code Quality (Detekt + ktlint)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: wrapper

      - name: Run Detekt
        run: ./gradlew detekt --continue
        continue-on-error: true

      - name: Run ktlint check
        run: ./gradlew ktlintCheck

      - name: Upload Detekt SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: .
          category: detekt
          wait-for-processing: true

      - name: Upload Detekt report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: detekt-report
          path: '**/build/reports/detekt/'
