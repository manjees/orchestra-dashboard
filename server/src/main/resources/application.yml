spring:
  datasource:
    url: ${DB_URL:jdbc:h2:mem:orchestra_dashboard;DB_CLOSE_DELAY=-1}
    username: ${DB_USER:sa}
    password: ${DB_PASS:}
    driver-class-name: ${DB_DRIVER:org.h2.Driver}

  h2:
    console:
      enabled: ${H2_CONSOLE:true}
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL:create-drop}
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

server:
  port: ${SERVER_PORT:8080}
  compression:
    enabled: true
    mime-types: application/json,application/xml,text/html

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized

logging:
  level:
    com.orchestradashboard: INFO
    org.springframework.web: WARN
    org.hibernate: WARN

jwt:
  secret: ${JWT_SECRET:default-dev-secret-that-is-at-least-32-bytes-long!!}
  access-expiration-ms: 900000
  refresh-expiration-ms: 604800000

auth:
  api-key: ${AUTH_API_KEY:dev-api-key}

dashboard:
  orchestrator:
    api-url: ${ORCHESTRATOR_API_URL:http://localhost:9000}
    api-key: ${ORCHESTRATOR_API_KEY:}
  websocket:
    heartbeat-interval-ms: ${WS_HEARTBEAT_MS:5000}
  agent:
    stale-threshold-ms: ${AGENT_STALE_MS:30000}
